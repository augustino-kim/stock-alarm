name: Stock Alarm Bot

on:
  schedule:
    - cron: '2,22,42 0-6 * * 1-5'
  workflow_dispatch:

# 이 부분을 추가하여 노란색 경고(Node.js 20)를 영구적으로 없앱니다.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run script
        run: python stock_bot.py
