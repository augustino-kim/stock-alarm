name: Stock Alarm Bot

on:
  schedule:
    # 한국 시간(KST) 기준: 오전 09:10 ~ 오후 15:50까지 작동
    # (UTC 기준: 00:10 ~ 06:50)
    - cron: '10,30,50 0-6 * * 1-5'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run script
        run: python stock_bot.py
