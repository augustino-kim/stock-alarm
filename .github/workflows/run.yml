name: Stock Alarm Bot

on:
  schedule:
    # 한국 시간 월~금 오전 09:10부터 20분 간격 (마지막 15:50)
    - cron: '10,30,50 0-6 * * 1-5'
  workflow_dispatch: # 👈 수동 실행을 위해 이 줄이 반드시 있어야 합니다!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run script
        run: python stock_bot.py
